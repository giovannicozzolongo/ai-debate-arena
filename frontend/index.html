<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate Arena</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <a href="/" class="logo-link">
                <h1 class="logo">Debate<span class="logo-dot">.</span> Arena</h1>
            </a>
            <p class="tagline">Two minds, one question. Watch AI agents argue it out.</p>
        </header>

        <section class="input-section">
            <div class="input-row">
                <input
                    type="text"
                    id="topic-input"
                    placeholder="What should they debate?"
                    autocomplete="off"
                >
                <button id="start-btn" onclick="startDebate()">Go</button>
            </div>
            <div class="suggestions">
                <span class="suggestion-label">Try:</span>
                <button class="suggestion" onclick="fillTopic(this)">Remote work is better than office work</button>
                <button class="suggestion" onclick="fillTopic(this)">University is worth the cost</button>
                <button class="suggestion" onclick="fillTopic(this)">AI will replace most jobs</button>
            </div>
            <div class="settings-row">
                <div class="setting">
                    <label for="provider-select">Model</label>
                    <select id="provider-select" onchange="toggleApiKey()">
                        <option value="groq">Llama 3.3 70B (free)</option>
                        <option value="anthropic">Claude Sonnet (bring your key)</option>
                        <option value="openai">GPT-4o mini (bring your key)</option>
                    </select>
                </div>
                <div class="setting" id="api-key-group" style="display:none;">
                    <label for="api-key-input">API Key</label>
                    <input type="password" id="api-key-input" placeholder="sk-...">
                </div>
            </div>
        </section>

        <p class="how-caption" id="how-it-works">Three rounds of back-and-forth, then a third agent judges who won.</p>

        <div class="status-bar" id="status-bar" style="display:none;">
            <div class="status-pulse"></div>
            <span id="status-text">Starting debate...</span>
        </div>

        <section class="arena" id="arena" style="display:none;">
            <div class="debater-col pro-col">
                <div class="col-header">
                    <span class="col-label pro-label">For</span>
                </div>
                <div class="arguments" id="pro-arguments"></div>
            </div>

            <div class="arena-divider"></div>

            <div class="debater-col con-col">
                <div class="col-header">
                    <span class="col-label con-label">Against</span>
                </div>
                <div class="arguments" id="con-arguments"></div>
            </div>
        </section>

        <section class="verdict-section" id="verdict-section" style="display:none;">
            <div class="verdict-bar"></div>
            <div class="verdict-header">
                <h2>The Verdict</h2>
            </div>
            <div class="verdict-content" id="verdict-content"></div>
        </section>

        <footer class="footer">Giovanni Cozzolongo</footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
